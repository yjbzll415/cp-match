<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CP命理匹配</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0e0b14; --card:#ffffff; --accent:#c084fc; --accent2:#f0abfc; --text-soft:#888; --white:#fff; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans SC',sans-serif; background:var(--bg); min-height:100vh; padding:40px 16px 80px; position:relative; overflow-x:hidden; }
  body::before { content:''; position:fixed; top:-30%; left:-20%; width:70vw; height:70vw; background:radial-gradient(circle,rgba(192,132,252,0.12) 0%,transparent 70%); pointer-events:none; }
  body::after  { content:''; position:fixed; bottom:-20%; right:-20%; width:60vw; height:60vw; background:radial-gradient(circle,rgba(240,171,252,0.08) 0%,transparent 70%); pointer-events:none; }

  .header { text-align:center; margin-bottom:36px; }
  .header-badge { display:inline-block; border:1px solid rgba(192,132,252,0.3); color:rgba(192,132,252,0.7); font-size:10px; letter-spacing:4px; text-transform:uppercase; padding:5px 18px; border-radius:30px; margin-bottom:16px; }
  .header h1 { font-family:'Noto Serif SC',serif; color:var(--white); font-size:clamp(22px,6vw,34px); font-weight:700; line-height:1.3; margin-bottom:8px; }
  .header h1 span { color:var(--accent2); }
  .header p { color:rgba(255,255,255,0.25); font-size:11px; letter-spacing:3px; }

  .card { max-width:460px; margin:0 auto 16px; background:var(--card); border-radius:20px; padding:36px 22px; box-shadow:0 8px 40px rgba(0,0,0,0.5); text-align:center; }
  .card-hint { font-family:'Noto Serif SC',serif; font-size:15px; color:#555; line-height:1.9; margin-bottom:28px; }

  .btn-primary { background:#111; color:white; border:none; padding:15px; font-family:'Noto Sans SC',sans-serif; font-size:15px; font-weight:700; letter-spacing:1px; border-radius:12px; cursor:pointer; width:100%; transition:opacity 0.15s,transform 0.15s; }
  .btn-primary:hover { opacity:0.82; transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); }
  .hidden { display:none !important; }

  .spinner-wrap { text-align:center; padding:50px 0; }
  .spinner { width:36px; height:36px; border:2px solid rgba(192,132,252,0.15); border-top-color:rgba(192,132,252,0.7); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 14px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner-text { color:rgba(255,255,255,0.3); font-size:13px; letter-spacing:2px; }

  #result { display:none; max-width:460px; margin:0 auto; }
  .result-header { text-align:center; margin-bottom:24px; }
  .result-header h2 { font-family:'Noto Serif SC',serif; color:white; font-size:20px; font-weight:700; margin-bottom:6px; }
  .result-header p { color:rgba(255,255,255,0.25); font-size:11px; letter-spacing:2px; }

  .top-cp-card { background:var(--card); border-radius:20px; overflow:hidden; margin-bottom:14px; box-shadow:0 10px 50px rgba(192,132,252,0.15); animation:fadeUp 0.45s ease both; }
  .cp-banner { width:100%; height:200px; background:linear-gradient(135deg,#1a0a2e 0%,#2d1b4e 50%,#1a0a2e 100%); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
  .cp-banner::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50% 60%,rgba(192,132,252,0.2) 0%,transparent 60%); }
  .cp-badge { position:absolute; top:14px; left:14px; background:white; color:#111; font-size:10px; font-weight:800; letter-spacing:2px; padding:5px 12px; border-radius:20px; z-index:3; }

  .cp-info { padding:20px 22px 22px; }
  .cp-name-main { font-family:'Noto Serif SC',serif; font-size:24px; font-weight:700; color:#111; letter-spacing:3px; margin-bottom:14px; }

  .cp-quote { background:#faf7ff; border-left:3px solid var(--accent); border-radius:0 10px 10px 0; padding:14px 16px; margin-bottom:16px; }
  .cp-quote-text { font-family:'Noto Serif SC',serif; font-size:16px; color:#333; line-height:1.9; }

  .match-score-row { display:flex; align-items:center; gap:10px; }
  .match-pill { display:inline-block; background:#111; color:white; font-size:11px; font-weight:700; padding:5px 14px; border-radius:20px; letter-spacing:0.5px; }
  .match-pct { display:inline-block; background:#f5f5f5; color:#666; font-size:10px; padding:3px 10px; border-radius:12px; }

  .retry-btn { display:block; width:100%; background:transparent; border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); padding:13px; font-family:'Noto Sans SC',sans-serif; font-size:13px; border-radius:12px; cursor:pointer; margin-top:2px; transition:all 0.2s; letter-spacing:1px; }
  .retry-btn:hover { border-color:rgba(255,255,255,0.25); color:rgba(255,255,255,0.55); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">✦ 灵魂配对系统 ✦</div>
  <h1>你的天命<span> CP </span>是谁</h1>
  <p>命理推演 · 天机流转</p>
</div>

<div class="card" id="step1-card">
  <div class="card-hint">命理已感知你的存在<br>点击开始，天机为你指引</div>
  <button class="btn-primary" onclick="calculate()">✨ 开始推算</button>
</div>

<div id="loadingArea" class="hidden">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="spinner-text">命理推算中，寻找你的天命CP……</div>
  </div>
</div>

<div id="result">
  <div class="result-header">
    <h2>你的天命 CP</h2>
    <p>命理 · 灵魂综合推演</p>
  </div>

  <div class="top-cp-card">
    <div class="cp-banner" id="topPhotoBanner">
      <div class="cp-badge">💫 命定第一</div>
      <img id="topPhoto" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;object-position:top center;filter:grayscale(15%);transition:filter 0.5s;" onmouseover="this.style.filter='grayscale(0%)'" onmouseout="this.style.filter='grayscale(15%)'" onerror="this.style.display='none';">
    </div>
    <div class="cp-info">
      <div class="cp-name-main" id="topCPName"></div>
      <div class="cp-quote">
        <div class="cp-quote-text" id="topQuote"></div>
      </div>
      <div class="match-score-row">
        <span class="match-pill">命中注定 · 灵魂共鸣</span>
        <span class="match-pct" id="topScore"></span>
      </div>
    </div>
  </div>

  <button class="retry-btn" onclick="resetAll()">↺ 重新推算</button>
</div>

<script>
const cpDatabase = [
  { name:"卡黄",     quote:"婷婷桑の笑顔は私の心の中で一番です", img:"./cp_photos/卡黄.jpg",     weight:3.3 },
  { name:"黑喵",     quote:"1500是800的两倍",                     img:"./cp_photos/黑喵.jpg",     weight:3 },
  { name:"艾朱",     quote:"生日快乐，我对自己说",                 img:"./cp_photos/艾朱.jpg",     weight:3.5 },
  { name:"左佳",     quote:"i want i want，爱情在这一刻绽放",      img:"./cp_photos/左佳.jpg",     weight:3 },
  { name:"七五折",   quote:"商场打折了，打五折还是一劼",   img:"./cp_photos/七五折.jpg",   weight:3.5 },
  { name:"戴莫",     quote:"多想被你牵起手，却总是差一点点",       img:"./cp_photos/戴莫.jpg",     weight:3 },
  { name:"奶包",     quote:"一年有365个日出，我送你999个玫瑰骨朵", img:"./cp_photos/奶包.jpg",     weight:3 },
  { name:"马鹿",     quote:"新粉，请问马鹿的鹿是谁的陆啊",         img:"./cp_photos/马鹿.jpg",     weight:3 },
  { name:"竹芝",     quote:"麻烦给我的爱人来一盒达美乐",           img:"./cp_photos/竹芝.jpg",     weight:3 },
  { name:"杉源",     quote:"你闲鱼有她的香水喂",                   img:"./cp_photos/杉源.jpg",     weight:3 },
  { name:"W门",      quote:"爱妹让人受尽委屈，找不到相爱的证据",   img:"./cp_photos/W门.jpg",      weight:3 },
  { name:"花倩月下", quote:"一瞬间紧紧拥抱无处可逃一吻天荒",       img:"./cp_photos/花倩月下.jpg", weight:3 },
  { name:"so蕾",     quote:"你照片有一道墙，但我发现一扇窗",       img:"./cp_photos/so蕾.jpg",     weight:3 },
  { name:"你和nene",quote:"想被你私有，我的心，毫无保留",        img:"./cp_photos/你和nene.jpg", weight:3.5 },
  { name:"艺些",     quote:"感谢你特别邀请~",                       img:"./cp_photos/艺些.jpg",     weight:3 },
  { name:"恩瑾",     quote:"幸福好不容易怎么你却不敢了呢",         img:"./cp_photos/恩瑾.jpg",     weight:1 },
  { name:"予宙终结", quote:"曲终人散，谁无过错，我看破",           img:"./cp_photos/予宙终结.jpg", weight:1 },
  { name:"坠芦爱河", quote:"我爱的人，不是我的爱人",               img:"./cp_photos/坠芦爱河.jpg", weight:1 },
  { name:"巨杉",     quote:"难道无病呻吟是错的吗~",                 img:"./cp_photos/巨杉.jpg",     weight:1 },
  { name:"聪冉",     quote:"希望聪聪越来越喜欢冉冉！",              img:"./cp_photos/聪冉.jpg",     weight:1 },
  { name:"水灰",     quote:"就像是精灵住错了森林~",                 img:"./cp_photos/水灰.jpg",     weight:1 },
  { name:"乐白",     quote:"谎称是友谊，却疏远的可以",              img:"./cp_photos/乐白.jpg",     weight:1 },
  { name:"蹄蹄乐",   quote:"品尝一口，爱的幸运曲奇",               img:"./cp_photos/蹄蹄乐.jpg",   weight:1 },
  { name:"册白",     quote:"你挥霍了我的崇拜",                      img:"./cp_photos/册白.jpg",     weight:1 },
];

function weightedRandom() {
  const total = cpDatabase.reduce((s, cp) => s + cp.weight, 0);
  let r = Math.random() * total;
  for (const cp of cpDatabase) {
    r -= cp.weight;
    if (r <= 0) return cp;
  }
  return cpDatabase[cpDatabase.length - 1];
}

function calculate() {
  document.getElementById('step1-card').classList.add('hidden');
  document.getElementById('loadingArea').classList.remove('hidden');
  setTimeout(showResult, 1200);
}

function showResult() {
  const top = weightedRandom();
  const pct = (82 + Math.random() * 13).toFixed(1);

  document.getElementById('topCPName').textContent = top.name;
  document.getElementById('topQuote').textContent  = top.quote;
  document.getElementById('topScore').textContent  = '匹配度 ' + pct + '%';

  const photoEl = document.getElementById('topPhoto');
  if (top.img) {
    photoEl.src = top.img;
    photoEl.style.display = 'block';
  } else {
    photoEl.style.display = 'none';
  }

  document.getElementById('loadingArea').classList.add('hidden');
  document.getElementById('result').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('step1-card').classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
